        .icons i, .icons .icon-wrap { transition:transform 0.4s ease,filter 0.3s ease; justify-self:center; }
        .project-box:hover .icons i, .project-box:hover .icons .icon-wrap { transform:translateY(-5px) rotate(3deg); filter:drop-shadow(0 0 15px rgba(0,255,255,0.8)) drop-shadow(0 0 25px rgba(160,32,240,0.6)); }

        .github { transition:all 0.3s ease; display:inline-block; position:relative; z-index:2; }

        /* ── Tooltip wrapper for <img> icons ── */
        .icon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: default;
        }
        .icon-wrap img {
            width: 40px;
            height: 40px;
            display: block;
            animation: none !important;
            transform: none !important;
            filter: none !important;
            transition: none !important;
        }

        /* ── Tooltip styles (works on span.icon-wrap and i elements) ── */
        .icon-wrap[data-tooltip],
        i[data-tooltip] {
            position: relative;
        }
        .icon-wrap[data-tooltip]::after,
        i[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            background: rgba(10,10,15,0.95);
            color: #00ffff;
            font-family: "Anonymous Pro", monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            white-space: nowrap;
            padding: 4px 9px;
            border-radius: 4px;
            border: 1px solid rgba(0,255,255,0.35);
            box-shadow: 0 0 12px rgba(0,255,255,0.25), 0 2px 8px rgba(0,0,0,0.6);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s ease, transform 0.18s ease;
            z-index: 9999;
        }
        .icon-wrap[data-tooltip]:hover::after,
        i[data-tooltip]:hover::after {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .icon-wrap[data-tooltip]:hover,
        i[data-tooltip]:hover {
            animation-play-state: paused !important;
        }

        /* ── Project link row (GitHub + Live Demo) ── */

            border-color: #00ffff;
            box-shadow: 0 0 14px rgba(0,255,255,0.5);
